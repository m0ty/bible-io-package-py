[build-system]
requires = ["build", "hatchling"]
build-backend = "hatchling.build"

[project]
name = "bible-io"
version = "1.0.0"
authors = [{ name = "Moty Fainer" }]
description = "Bible parsing package"
readme = "README.md"
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "build",
    "hatchling",
    "pytest"
]

[project.urls]
"Homepage" = "https://bitbucket.org/ReeAutomotiveLtd/ree_uds_package"
