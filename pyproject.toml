[build-system]
requires = ["build", "hatchling"]
build-backend = "hatchling.build"

[project]
name = "bible-io"
version = "1.0.0"
authors = [{ name = "Moty Fainer" }]
description = "Bible parsing package"
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "build",
    "hatchling",
    "mypy>=1.11",
    "pytest==8.4.2",
]

[project.urls]
"Homepage" = "https://github.com/m0ty/bible-io-package-py"
